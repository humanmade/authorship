name: JavaScript Tests
on:
  push:
    branches:
      - 'develop'
      - 'main'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Test the Build
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Debugging
      run: |
        node -v
        npm -v

    - name: Get npm cache directory
      id: npm-cache-dir
      run: |
        echo "DIR=$(npm config get cache)" >> $GITHUB_OUTPUT
        echo "NPM_VERSION=$(npm -v)" >> $GITHUB_OUTPUT
        echo "NODE_VERSION=$(node -v)" >> $GITHUB_OUTPUT

    - name: Cache Dependencies
      id: npm-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ steps.npm-cache-dir.outputs.DIR }}
        key: ${{ runner.os }}-npm-${{ steps.npm-cache-dir.outputs.NODE_VERSION }}-${{ steps.npm-cache-dir.outputs.NPM_VERSION }}-${{ hashFiles('package-lock.json') }}

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Run the build
      run: |
        npm run lint
        npm run build
